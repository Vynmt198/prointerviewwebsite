<head>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    // Fix ReferenceError: timer is not defined in custom.min.js
    window.timer = window.timer || null;

    // Tự động chuyển hướng link không có dấu # sang có dấu # (dành cho HashRouter)
    (function() {
      var path = window.location.pathname;
      var search = window.location.search;
      if (path !== '/' && path !== '/index.html' && !window.location.hash) {
        window.location.replace(window.location.origin + '/#' + path + search);
      }
    })();
  </script>
</head>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
