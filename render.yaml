# Render Blueprint — backend API (monorepo).
# Dashboard: New → Blueprint → chọn repo; sau lần đầu điền biến bí mật (MONGO_URI, JWT_SECRET, ...).
# Hoặc: New → Web Service → Root Directory = backend (bỏ qua file này).
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: prointerview-backend
    runtime: node
    plan: free
    # oregon = default Render (free tier thường ổn). Đổi frankfurt/singapore trong Dashboard nếu cần — không sửa được sau khi tạo service.
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FRONTEND_URL
        sync: false
